<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // SPA redirect for GitHub Pages: rewrite /foo → /?p=/foo
      // App.tsx reads ?p and restores the path via history.replaceState.
      (function () {
        var path =
          window.location.pathname +
          window.location.search +
          window.location.hash;
        var base = '/';
        var redirect = base + '?p=' + encodeURIComponent(path);
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
